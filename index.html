<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AKAZA Servicios</title>

<style>
:root{
  --bg:#0b0b0c;
  --card:#161617;
  --text:#f5f5f7;
  --muted:#86868b;
  --primary:#0a84ff;
  --border:rgba(255,255,255,.10);
  --radius:18px;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:-apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
  color:var(--text);
  overflow-x:hidden;

  background:
    radial-gradient(circle at 15% 10%, rgba(76,201,240,.10), transparent 22%),
    radial-gradient(circle at 85% 18%, rgba(181,23,255,.12), transparent 24%),
    radial-gradient(circle at 50% 100%, rgba(255,78,205,.08), transparent 26%),
    linear-gradient(180deg, #111214 0%, #090909 55%, #000000 100%);

  background-attachment: fixed;
}

/* iluminación dinámica */
body::before{
  content:"";
  position:fixed;
  inset:-10%;
  z-index:-1;
  pointer-events:none;
  background:
    radial-gradient(circle at 20% 20%, rgba(76,201,240,.12), transparent 22%),
    radial-gradient(circle at 80% 25%, rgba(181,23,255,.14), transparent 24%),
    radial-gradient(circle at 50% 85%, rgba(255,78,205,.08), transparent 22%);
  filter:blur(30px);
  transform:translateY(var(--bg-shift, 0px));
  will-change:transform;
}

h1,h2,h3{
  letter-spacing:-0.02em;
}

.wrap{
  max-width:1100px;
  margin:auto;
  padding:20px;
}

/* HEADER */
header{
  background:rgba(22,22,23,.7);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:20px;
  margin-bottom:20px;
  backdrop-filter:blur(16px);
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:14px;
}

@media(max-width:900px){
  .grid{grid-template-columns:repeat(2,1fr)}
}

@media(max-width:600px){
  .grid{grid-template-columns:1fr}
}

/* CARDS */
.card{
  position:relative;
  overflow:hidden;
  background:linear-gradient(145deg, rgba(28,28,30,.95), rgba(17,17,19,.98));
  border-radius:18px;
  padding:16px;
  border:1px solid rgba(255,255,255,.06);

  box-shadow:
    0 10px 30px rgba(0,0,0,.55),
    inset 0 1px 0 rgba(255,255,255,.04);

  transition:all .3s ease;
}

/* luz interna */
.card::before{
  content:"";
  position:absolute;
  width:220px;
  height:220px;
  top:-70px;
  left:-70px;
  background:radial-gradient(circle, rgba(10,132,255,.14), transparent 70%);
  filter:blur(35px);
}

/* glow inferior */
.card::after{
  content:"";
  position:absolute;
  left:10%;
  right:10%;
  bottom:-18px;
  height:40px;
  background:radial-gradient(ellipse at center, rgba(10,132,255,.18), transparent 70%);
  filter:blur(22px);
  z-index:-1;
}

.card:hover{
  transform:translateY(-6px) scale(1.01);
  box-shadow:
    0 22px 45px rgba(0,0,0,.8),
    0 0 25px rgba(10,132,255,.2);
}

/* BOTÓN */
.wa{
  width:100%;
  margin-top:10px;
  background:linear-gradient(180deg,#0a84ff,#0066cc);
  color:#fff;
  border:none;
  border-radius:12px;
  padding:12px;
  font-weight:600;
  cursor:pointer;
  transition:all .3s ease;
}

.wa:hover{
  transform:scale(1.03);
  box-shadow:0 6px 18px rgba(10,132,255,.6);
}

</style>
</head>

<body>

<div class="wrap">
<header>
<h1>AKAZA SERVICIOS</h1>
<p style="color:var(--muted)">Streaming • IA • Software</p>
</header>

<div class="grid">

<!-- EJEMPLO CARD -->
<div class="card">
  <h3>Netflix</h3>
  <p class="price">S/10</p>
  <button class="wa">Pedir por WhatsApp</button>
</div>

</div>
</div>

<!-- SCRIPT MOVIMIENTO REAL -->
<script>
window.addEventListener("scroll", () => {
  const scrollY = window.scrollY;

  document.body.style.backgroundPosition =
    `0 ${scrollY * 0.08}px,
     0 ${scrollY * 0.04}px,
     0 ${scrollY * 0.12}px,
     0 0`;

  document.documentElement.style.setProperty(
    '--bg-shift',
    `${scrollY * 0.06}px`
  );
});
</script>

</body>
</html>
